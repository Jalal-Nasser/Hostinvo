services:
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile.prod
    image: hostinvo-app:prod
    restart: unless-stopped
    env_file:
      - ./backend/.env.production
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_HOST: ${DB_HOST:-postgres}
      REDIS_HOST: ${REDIS_HOST:-redis}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "9000"
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - hostinvo-prod

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile.prod
    image: hostinvo-nginx:prod
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
    ports:
      - "${APP_HTTP_PORT:-80}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - hostinvo-prod

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hostinvo}
      POSTGRES_USER: ${POSTGRES_USER:-hostinvo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-this}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hostinvo} -d ${POSTGRES_DB:-hostinvo}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-prod-data:/var/lib/postgresql/data
    networks:
      - hostinvo-prod

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis-prod-data:/data
    networks:
      - hostinvo-prod

  queue-worker:
    image: hostinvo-app:prod
    restart: unless-stopped
    command: ["supervisord", "-n", "-c", "/etc/supervisord.conf"]
    env_file:
      - ./backend/.env.production
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_HOST: ${DB_HOST:-postgres}
      REDIS_HOST: ${REDIS_HOST:-redis}
      QUEUE_WORKER_CRITICAL_PROCS: ${QUEUE_WORKER_CRITICAL_PROCS:-2}
      QUEUE_WORKER_DEFAULT_PROCS: ${QUEUE_WORKER_DEFAULT_PROCS:-2}
      QUEUE_WORKER_LOW_PROCS: ${QUEUE_WORKER_LOW_PROCS:-1}
    depends_on:
      app:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "supervisorctl status | grep -E 'RUNNING' > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - hostinvo-prod

volumes:
  postgres-prod-data:
  redis-prod-data:

networks:
  hostinvo-prod:
    driver: bridge
