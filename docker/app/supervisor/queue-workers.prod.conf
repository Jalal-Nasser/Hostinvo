directory=/var/www/backend
autostart=true
autorestart=true
startretries=3
stopwaitsecs=3600
stopasgroup=true
killasgroup=true
user=www-data
numprocs=%(ENV_QUEUE_WORKER_DEFAULT_PROCS)s
redirect_stderr=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0

