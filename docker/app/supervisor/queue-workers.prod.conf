process_name=%(program_name)s_%(process_num)02d
command=php /var/www/backend/artisan queue:work redis --queue=%(ENV_QUEUE_TIER_LOW)s --sleep=%(ENV_QUEUE_WORKER_SLEEP)s --tries=2 --timeout=%(ENV_QUEUE_WORKER_TIMEOUT)s --backoff=120 --max-time=%(ENV_QUEUE_WORKER_MAX_TIME)s --no-interaction
directory=/var/www/backend
autostart=true
