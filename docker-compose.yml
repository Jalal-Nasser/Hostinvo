services:
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    working_dir: /var/www/backend
    volumes:
      - ./backend:/var/www/backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - hostinvo

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    ports:
      - "${APP_HTTP_PORT:-8080}:80"
    volumes:
      - ./backend:/var/www/backend
    depends_on:
      - app
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - hostinvo

  postgres:
    image: postgres:16-alpine
    ports:
      - "${FORWARD_DB_PORT:-54320}:5432"
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-hostinvo}"
      POSTGRES_USER: "${POSTGRES_USER:-hostinvo}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-hostinvo}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hostinvo} -d ${POSTGRES_DB:-hostinvo}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - hostinvo

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${FORWARD_REDIS_PORT:-63790}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hostinvo

  queue-worker:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    working_dir: /var/www/backend
    command: ["php", "artisan", "queue:work", "redis", "--queue=critical,default,low", "--sleep=3", "--tries=3", "--timeout=120", "--backoff=60,300,900"]
    volumes:
      - ./backend:/var/www/backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      app:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "ps -o args= 1 | grep -q 'queue:work' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - hostinvo

  scheduler:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    working_dir: /var/www/backend
    command: ["/bin/sh", "-lc", "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"]
    volumes:
      - ./backend:/var/www/backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      app:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "ps -o args= 1 | grep -q 'schedule:run' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - hostinvo

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "${FORWARD_MAILPIT_SMTP_PORT:-1025}:1025"
      - "${FORWARD_MAILPIT_DASHBOARD_PORT:-8025}:8025"
    networks:
      - hostinvo

volumes:
  postgres-data:
  redis-data:

networks:
  hostinvo:
    driver: bridge
